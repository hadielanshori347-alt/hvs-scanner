<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver - GTW BDO</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script> requireLogin(); renderNavbar("driver"); </script>

  <div class="container">
    <div class="page-title">🚚 Data Driver</div>

    <div class="card">
      <div class="card-title">➕ Tambah Data Driver</div>
      <div class="form-grid">
        <div class="form-group">
          <label>ID Driver</label>
          <input type="text" id="id_driver" placeholder="ID Driver" />
        </div>
        <div class="form-group">
          <label>From (Asal)</label>
          <input type="text" id="from_loc" placeholder="Kota asal" />
        </div>
        <div class="form-group">
          <label>Tujuan</label>
          <input type="text" id="tujuan" placeholder="Kota tujuan" />
        </div>
        <div class="form-group">
          <label>Latitude</label>
          <input type="number" id="lat" placeholder="0.000000" step="any" />
        </div>
        <div class="form-group">
          <label>Longitude</label>
          <input type="number" id="lng" placeholder="0.000000" step="any" />
        </div>
        <div class="form-group">
          <label>Tanggal Berangkat</label>
          <input type="datetime-local" id="date_berangkat" />
        </div>
        <div class="form-group">
          <label>Status Berangkat</label>
          <select id="status_berangkat">
            <option value="BERANGKAT">BERANGKAT</option>
            <option value="SAMPAI">SAMPAI</option>
            <option value="PENDING">PENDING</option>
          </select>
        </div>
        <div class="form-group">
          <label>Foto Berangkat (URL)</label>
          <input type="url" id="foto_berangkat" placeholder="https://..." />
        </div>
        <div class="form-group">
          <label>Tanggal Sampai</label>
          <input type="datetime-local" id="date_sampai" />
        </div>
        <div class="form-group">
          <label>Status Sampai</label>
          <select id="status_sampai">
            <option value="">-- Belum --</option>
            <option value="SAMPAI">SAMPAI</option>
            <option value="TERLAMBAT">TERLAMBAT</option>
          </select>
        </div>
        <div class="form-group">
          <label>Foto Sampai (URL)</label>
          <input type="url" id="foto_sampai" placeholder="https://..." />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="btnSimpan" onclick="simpanDriver()">💾 Simpan</button>
        <button class="btn" style="background:#e5e7eb" onclick="resetForm()">Reset</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📋 Daftar Driver</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>ID Driver</th><th>From</th><th>Tujuan</th>
              <th>Berangkat</th><th>Status</th><th>Sampai</th><th>Status Sampai</th><th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tbData">
            <tr><td colspan="9" style="text-align:center;padding:20px;color:#999">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let editId = null;

    async function init() {
      document.getElementById("date_berangkat").value = todayISO();
      loadData();
    }

    async function loadData() {
      try {
        const data = await dbGet("driver", "select=*&order=date_berangkat.desc&limit=50");
        const tb = document.getElementById("tbData");
        if (data.length === 0) {
          tb.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:30px;color:#999">Belum ada data</td></tr>`;
          return;
        }
        tb.innerHTML = data.map((r, i) => `
          <tr>
            <td>${i+1}</td>
            <td><strong>${r.id_driver || "-"}</strong></td>
            <td>${r.from_loc || "-"}</td>
            <td>${r.tujuan || "-"}</td>
            <td>${formatDate(r.date_berangkat)}</td>
            <td><span class="badge ${r.status_berangkat==='SAMPAI'?'badge-green':'badge-yellow'}">${r.status_berangkat||"-"}</span></td>
            <td>${formatDate(r.date_sampai)}</td>
            <td><span class="badge ${r.status_sampai==='SAMPAI'?'badge-green':r.status_sampai==='TERLAMBAT'?'badge-red':'badge-blue'}">${r.status_sampai||"-"}</span></td>
            <td style="display:flex;gap:5px">
              <button class="btn btn-sm btn-accent" onclick="editDriver(${r.id})">✏️</button>
              <button class="btn btn-sm btn-danger" onclick="hapusDriver(${r.id})">🗑️</button>
            </td>
          </tr>`).join("");
      } catch(e) { showToast("Gagal memuat", "error"); }
    }

    async function simpanDriver() {
      const btn = document.getElementById("btnSimpan");
      const payload = {
        id_driver: document.getElementById("id_driver").value.trim(),
        from_loc: document.getElementById("from_loc").value.trim(),
        tujuan: document.getElementById("tujuan").value.trim(),
        lat: parseFloat(document.getElementById("lat").value) || null,
        lng: parseFloat(document.getElementById("lng").value) || null,
        date_berangkat: document.getElementById("date_berangkat").value || null,
        status_berangkat: document.getElementById("status_berangkat").value,
        foto_berangkat: document.getElementById("foto_berangkat").value.trim() || null,
        date_sampai: document.getElementById("date_sampai").value || null,
        status_sampai: document.getElementById("status_sampai").value || null,
        foto_sampai: document.getElementById("foto_sampai").value.trim() || null,
      };
      if (!payload.id_driver) { showToast("Isi ID Driver", "error"); return; }
      setLoading(btn, true);
      try {
        if (editId) {
          await dbUpdate("driver", editId, payload);
          showToast("Data driver diperbarui ✅");
          editId = null;
        } else {
          await dbInsert("driver", payload);
          showToast("Data driver disimpan ✅");
        }
        resetForm();
        loadData();
      } catch(e) { showToast("Gagal: " + e.message, "error"); }
      setLoading(btn, false);
    }

    async function editDriver(id) {
      try {
        const data = await dbGet("driver", `id=eq.${id}&select=*`);
        const r = data[0];
        editId = id;
        document.getElementById("id_driver").value = r.id_driver || "";
        document.getElementById("from_loc").value = r.from_loc || "";
        document.getElementById("tujuan").value = r.tujuan || "";
        document.getElementById("lat").value = r.lat || "";
        document.getElementById("lng").value = r.lng || "";
        document.getElementById("date_berangkat").value = r.date_berangkat?.slice(0,16) || "";
        document.getElementById("status_berangkat").value = r.status_berangkat || "BERANGKAT";
        document.getElementById("foto_berangkat").value = r.foto_berangkat || "";
        document.getElementById("date_sampai").value = r.date_sampai?.slice(0,16) || "";
        document.getElementById("status_sampai").value = r.status_sampai || "";
        document.getElementById("foto_sampai").value = r.foto_sampai || "";
        document.getElementById("btnSimpan").textContent = "✏️ Update";
        window.scrollTo({top:0, behavior:"smooth"});
      } catch(e) { showToast("Gagal memuat", "error"); }
    }

    async function hapusDriver(id) {
      confirmDelete(async () => {
        try { await dbDelete("driver", id); showToast("Dihapus"); loadData(); }
        catch(e) { showToast("Gagal hapus", "error"); }
      });
    }

    function resetForm() {
      ["id_driver","from_loc","tujuan","lat","lng","foto_berangkat","date_sampai","foto_sampai"]
        .forEach(id => document.getElementById(id).value = "");
      document.getElementById("date_berangkat").value = todayISO();
      document.getElementById("status_berangkat").value = "BERANGKAT";
      document.getElementById("status_sampai").value = "";
      editId = null;
      document.getElementById("btnSimpan").textContent = "💾 Simpan";
    }

    init();
  </script>
</body>
</html>
