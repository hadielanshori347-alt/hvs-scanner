<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outbound (OB) - GTW BDO</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script> requireLogin(); renderNavbar("ob"); </script>

  <div class="container">
    <div class="page-title">📦 Input Outbound (OB)</div>

    <div class="card">
      <div class="card-title">➕ Tambah OB Baru</div>
      <div class="form-grid">
        <div class="form-group">
          <label>No Track / Bag</label>
          <input type="text" id="no_track" placeholder="Masukkan No Track" />
        </div>
        <div class="form-group">
          <label>Incharge</label>
          <select id="incharge" onchange="loadTujuan()">
            <option value="">-- Pilih Incharge --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Service</label>
          <select id="service" onchange="loadTujuan()">
            <option value="">-- Pilih Service --</option>
            <option value="SAMEDAY">SAMEDAY</option>
            <option value="NEXTDAY">NEXTDAY</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tujuan</label>
          <select id="tujuan">
            <option value="">-- Pilih Tujuan --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tanggal & Waktu</label>
          <input type="datetime-local" id="created_date" />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="status">
            <option value="PROSES">PROSES</option>
            <option value="SELESAI">SELESAI</option>
            <option value="PENDING">PENDING</option>
          </select>
        </div>
        <div class="form-group">
          <label>Total AWB</label>
          <input type="number" id="total_awb" placeholder="0" min="0" />
        </div>
        <div class="form-group">
          <label>URL Foto</label>
          <input type="url" id="foto_url" placeholder="https://..." />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="btnSimpan" onclick="simpanOB()">💾 Simpan</button>
        <button class="btn" style="background:#e5e7eb" onclick="resetForm()">Reset</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📋 Data OB</div>
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        <input type="date" id="filterTgl" style="padding:7px 10px;border:1.5px solid #d1d5db;border-radius:7px;font-size:0.9rem" />
        <button class="btn btn-primary btn-sm" onclick="loadData()">🔍 Filter</button>
        <button class="btn btn-sm" style="background:#e5e7eb" onclick="clearFilter()">Reset</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>No Track</th><th>Incharge</th><th>Service</th><th>Tujuan</th>
              <th>Tanggal</th><th>Status</th><th>Total AWB</th><th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tbData">
            <tr><td colspan="9" style="text-align:center;padding:20px;color:#999">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let editId = null;

    async function init() {
      document.getElementById("created_date").value = todayISO();
      // Load incharge
      try {
        const data = await dbGet("data_incharge", "select=incharge&order=incharge");
        const unique = [...new Set(data.map(d => d.incharge))];
        const sel = document.getElementById("incharge");
        unique.forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
      } catch(e) {}
      loadData();
    }

    async function loadTujuan() {
      const incharge = document.getElementById("incharge").value;
      const service = document.getElementById("service").value;
      const sel = document.getElementById("tujuan");
      sel.innerHTML = `<option value="">-- Pilih Tujuan --</option>`;
      if (!incharge || !service) return;
      try {
        const data = await dbGet("data_routing", `incharge=eq.${incharge}&service=eq.${service}&select=tujuan`);
        data.forEach(d => sel.innerHTML += `<option value="${d.tujuan}">${d.tujuan}</option>`);
      } catch(e) {}
    }

    async function loadData() {
      const tgl = document.getElementById("filterTgl").value;
      let params = "select=*&order=created_date.desc&limit=50";
      if (tgl) params += `&created_date=gte.${tgl}&created_date=lte.${tgl}T23:59:59`;
      try {
        const data = await dbGet("ob", params);
        const tb = document.getElementById("tbData");
        if (data.length === 0) {
          tb.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:30px;color:#999">Belum ada data</td></tr>`;
          return;
        }
        tb.innerHTML = data.map((r, i) => `
          <tr>
            <td>${i+1}</td>
            <td><strong>${r.no_track || "-"}</strong></td>
            <td>${r.incharge || "-"}</td>
            <td>${r.service || "-"}</td>
            <td>${r.tujuan || "-"}</td>
            <td>${formatDate(r.created_date)}</td>
            <td><span class="badge ${r.status==='SELESAI'?'badge-green':r.status==='PENDING'?'badge-red':'badge-yellow'}">${r.status||"-"}</span></td>
            <td>${r.total_awb || 0}</td>
            <td style="display:flex;gap:5px">
              <button class="btn btn-sm btn-accent" onclick="editOB(${r.id})">✏️</button>
              <button class="btn btn-sm btn-danger" onclick="hapusOB(${r.id})">🗑️</button>
            </td>
          </tr>`).join("");
      } catch(e) {
        showToast("Gagal memuat data", "error");
      }
    }

    async function simpanOB() {
      const btn = document.getElementById("btnSimpan");
      const payload = {
        no_track: document.getElementById("no_track").value.trim(),
        incharge: document.getElementById("incharge").value,
        service: document.getElementById("service").value,
        tujuan: document.getElementById("tujuan").value,
        created_date: document.getElementById("created_date").value || null,
        status: document.getElementById("status").value,
        total_awb: parseInt(document.getElementById("total_awb").value) || 0,
        foto_url: document.getElementById("foto_url").value.trim() || null,
      };
      if (!payload.no_track || !payload.incharge || !payload.tujuan) {
        showToast("Lengkapi field wajib (No Track, Incharge, Tujuan)", "error"); return;
      }
      setLoading(btn, true);
      try {
        if (editId) {
          await dbUpdate("ob", editId, payload);
          showToast("Data berhasil diperbarui ✅");
          editId = null;
          btn.textContent = "💾 Simpan";
        } else {
          await dbInsert("ob", payload);
          showToast("Data OB berhasil disimpan ✅");
        }
        resetForm();
        loadData();
      } catch(e) {
        showToast("Gagal menyimpan: " + e.message, "error");
      }
      setLoading(btn, false);
    }

    async function editOB(id) {
      try {
        const data = await dbGet("ob", `id=eq.${id}&select=*`);
        const r = data[0];
        editId = id;
        document.getElementById("no_track").value = r.no_track || "";
        document.getElementById("incharge").value = r.incharge || "";
        await loadTujuan();
        document.getElementById("service").value = r.service || "";
        document.getElementById("tujuan").value = r.tujuan || "";
        document.getElementById("created_date").value = r.created_date?.slice(0,16) || "";
        document.getElementById("status").value = r.status || "PROSES";
        document.getElementById("total_awb").value = r.total_awb || 0;
        document.getElementById("foto_url").value = r.foto_url || "";
        document.getElementById("btnSimpan").textContent = "✏️ Update";
        window.scrollTo({top:0, behavior:"smooth"});
      } catch(e) { showToast("Gagal memuat data", "error"); }
    }

    async function hapusOB(id) {
      confirmDelete(async () => {
        try {
          await dbDelete("ob", id);
          showToast("Data dihapus");
          loadData();
        } catch(e) { showToast("Gagal hapus", "error"); }
      });
    }

    function resetForm() {
      ["no_track","foto_url"].forEach(id => document.getElementById(id).value = "");
      ["incharge","service","tujuan"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("status").value = "PROSES";
      document.getElementById("total_awb").value = "";
      document.getElementById("created_date").value = todayISO();
      editId = null;
      document.getElementById("btnSimpan").textContent = "💾 Simpan";
    }

    function clearFilter() {
      document.getElementById("filterTgl").value = "";
      loadData();
    }

    init();
  </script>
</body>
</html>
