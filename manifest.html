<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manifest - GTW BDO</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script> requireLogin(); renderNavbar("manifest"); </script>

  <div class="container">
    <div class="page-title">📋 Manifest</div>

    <div class="card">
      <div class="card-title">➕ Tambah Manifest</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Incharge</label>
          <select id="incharge">
            <option value="">-- Pilih Incharge --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Service</label>
          <select id="service">
            <option value="SAMEDAY">SAMEDAY</option>
            <option value="NEXTDAY">NEXTDAY</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tujuan</label>
          <input type="text" id="tujuan" placeholder="Tujuan pengiriman" />
        </div>
        <div class="form-group">
          <label>Tanggal</label>
          <input type="date" id="tanggal" />
        </div>
        <div class="form-group">
          <label>Jumlah AWB</label>
          <input type="number" id="jumlah" placeholder="0" min="0" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="btnSimpan" onclick="simpanManifest()">💾 Simpan</button>
        <button class="btn" style="background:#e5e7eb" onclick="resetForm()">Reset</button>
      </div>
    </div>

    <!-- Filter & Rekap -->
    <div class="card">
      <div class="card-title">📊 Rekap Manifest</div>
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
        <div class="form-group" style="margin:0">
          <label style="font-size:0.78rem;color:#6b7280">Dari Tanggal</label>
          <input type="date" id="filterFrom" style="padding:7px 10px;border:1.5px solid #d1d5db;border-radius:7px;font-size:0.9rem" />
        </div>
        <div class="form-group" style="margin:0">
          <label style="font-size:0.78rem;color:#6b7280">Sampai Tanggal</label>
          <input type="date" id="filterTo" style="padding:7px 10px;border:1.5px solid #d1d5db;border-radius:7px;font-size:0.9rem" />
        </div>
        <div style="margin-top:18px;display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="loadData()">🔍 Filter</button>
          <button class="btn btn-sm" style="background:#e5e7eb" onclick="clearFilter()">Reset</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Tanggal</th><th>Incharge</th><th>Service</th><th>Tujuan</th><th>Jumlah AWB</th><th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tbData">
            <tr><td colspan="7" style="text-align:center;padding:20px;color:#999">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
      <div id="totalBar" style="display:none;margin-top:14px;padding:12px 16px;background:#f0f4f8;border-radius:8px;font-weight:600;color:var(--primary)"></div>
    </div>
  </div>

  <script>
    let editId = null;

    async function init() {
      document.getElementById("tanggal").value = new Date().toISOString().slice(0,10);
      const today = new Date().toISOString().slice(0,10);
      document.getElementById("filterFrom").value = today;
      document.getElementById("filterTo").value = today;

      try {
        const data = await dbGet("data_incharge", "select=incharge&order=incharge");
        const unique = [...new Set(data.map(d => d.incharge))];
        const sel = document.getElementById("incharge");
        unique.forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
      } catch(e) {}
      loadData();
    }

    async function loadData() {
      const from = document.getElementById("filterFrom").value;
      const to = document.getElementById("filterTo").value;
      let params = "select=*&order=tanggal.desc,id.desc&limit=100";
      if (from) params += `&tanggal=gte.${from}`;
      if (to)   params += `&tanggal=lte.${to}`;

      try {
        const data = await dbGet("manifest", params);
        const tb = document.getElementById("tbData");
        const totalBar = document.getElementById("totalBar");

        if (data.length === 0) {
          tb.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:30px;color:#999">Belum ada data manifest</td></tr>`;
          totalBar.style.display = "none";
          return;
        }

        const total = data.reduce((s, r) => s + (r.jumlah || 0), 0);
        tb.innerHTML = data.map((r, i) => `
          <tr>
            <td>${i+1}</td>
            <td>${formatDateOnly(r.tanggal)}</td>
            <td>${r.incharge || "-"}</td>
            <td>${r.service || "-"}</td>
            <td>${r.tujuan || "-"}</td>
            <td><strong>${r.jumlah || 0}</strong></td>
            <td style="display:flex;gap:5px">
              <button class="btn btn-sm btn-accent" onclick="editManifest(${r.id})">✏️</button>
              <button class="btn btn-sm btn-danger" onclick="hapusManifest(${r.id})">🗑️</button>
            </td>
          </tr>`).join("");

        totalBar.style.display = "block";
        totalBar.textContent = `Total AWB: ${total} dari ${data.length} manifest`;
      } catch(e) { showToast("Gagal memuat", "error"); }
    }

    async function simpanManifest() {
      const btn = document.getElementById("btnSimpan");
      const payload = {
        incharge: document.getElementById("incharge").value,
        service: document.getElementById("service").value,
        tujuan: document.getElementById("tujuan").value.trim(),
        tanggal: document.getElementById("tanggal").value || null,
        jumlah: parseInt(document.getElementById("jumlah").value) || 0,
      };
      if (!payload.incharge || !payload.tujuan) { showToast("Lengkapi Incharge & Tujuan", "error"); return; }
      setLoading(btn, true);
      try {
        if (editId) {
          await dbUpdate("manifest", editId, payload);
          showToast("Manifest diperbarui ✅");
          editId = null;
        } else {
          await dbInsert("manifest", payload);
          showToast("Manifest disimpan ✅");
        }
        resetForm();
        loadData();
      } catch(e) { showToast("Gagal: " + e.message, "error"); }
      setLoading(btn, false);
    }

    async function editManifest(id) {
      try {
        const data = await dbGet("manifest", `id=eq.${id}&select=*`);
        const r = data[0];
        editId = id;
        document.getElementById("incharge").value = r.incharge || "";
        document.getElementById("service").value = r.service || "";
        document.getElementById("tujuan").value = r.tujuan || "";
        document.getElementById("tanggal").value = r.tanggal?.slice(0,10) || "";
        document.getElementById("jumlah").value = r.jumlah || 0;
        document.getElementById("btnSimpan").textContent = "✏️ Update";
        window.scrollTo({top:0, behavior:"smooth"});
      } catch(e) { showToast("Gagal memuat", "error"); }
    }

    async function hapusManifest(id) {
      confirmDelete(async () => {
        try { await dbDelete("manifest", id); showToast("Dihapus"); loadData(); }
        catch(e) { showToast("Gagal hapus", "error"); }
      });
    }

    function resetForm() {
      document.getElementById("incharge").value = "";
      document.getElementById("tujuan").value = "";
      document.getElementById("jumlah").value = "";
      document.getElementById("tanggal").value = new Date().toISOString().slice(0,10);
      editId = null;
      document.getElementById("btnSimpan").textContent = "💾 Simpan";
    }

    function clearFilter() {
      const today = new Date().toISOString().slice(0,10);
      document.getElementById("filterFrom").value = today;
      document.getElementById("filterTo").value = today;
      loadData();
    }

    init();
  </script>
</body>
</html>
