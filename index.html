<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Permissions-Policy" content="camera=*, microphone=*">
  <title>HVS Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif}
    body{background:#f5f5f5}
    .header{background:#0D6EFD;color:white;padding:16px;text-align:center}
    #reader{width:100%;height:50vh;background:#000}
    .btn-primary{background:#0D6EFD;color:white;border:none;padding:16px;width:100%;font-size:16px}
    .antrian{padding:16px;background:white;margin:8px;border-radius:8px}
  </style>
</head>
<body>
  <div class="header">HVS Scanner</div>
  <div id="reader"></div>
  <div id="antrian"></div>
  <button class="btn-primary" onclick="kirimData()">KIRIM DATA</button>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzCJYvXnJ-1jzlN7GZN5pg956x_M4VxkvQTL9FE4IatDPosGKFCGlUtXZyxLNoUom8HAA/exec';
    let antrianAWB = [];

    function onScanSuccess(decodedText) {
      if(!antrianAWB.includes(decodedText)){
        antrianAWB.push(decodedText);
        renderAntrian();
      }
    }

    function renderAntrian(){
      document.getElementById('antrian').innerHTML = '';
      antrianAWB.forEach(awb => {
        document.getElementById('antrian').innerHTML += 
          `<div class="antrian">${awb}</div>`;
      });
    }

    function kirimData(){
      const nohvs = new URLSearchParams(window.location.search).get('nohvs');
      if(!nohvs){
        alert('No HVS tidak ditemukan di URL');
        return;
      }
      fetch(GAS_URL, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain'},
        body: JSON.stringify({
          action: 'bulkScan',
          nohvs: nohvs,
          listAWB: antrianAWB
        })
      })
      .then(r => r.json())
      .then(data => {
        if(data.status == 'sukses'){
          alert('Berhasil simpan '+data.count+' AWB');
          antrianAWB = [];
          renderAntrian();
        } else {
          alert('Error: '+data.msg);
        }
      })
      .catch(e => alert('Error: '+e));
    }

    window.onload = function(){
      new Html5Qrcode("reader").start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess,
        () => {}
      );
    };
  </script>
</body>
</html>
