<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - GTW BDO</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div class="login-box">
    <div class="login-logo">
      <h1>🚀 GTW BDO</h1>
      <p>Outbound Gateway Bandung</p>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Masukkan username" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="btnLogin" onclick="handleLogin()">Masuk</button>
    <div class="login-err" id="loginErr">Username atau password salah.</div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Jika sudah login, langsung ke dashboard
    if (getSession()) window.location.href = "pages/dashboard.html";

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") handleLogin();
    });

    async function handleLogin() {
      const username = document.getElementById("username").value.trim().toUpperCase();
      const password = document.getElementById("password").value.trim();
      const btn = document.getElementById("btnLogin");
      const err = document.getElementById("loginErr");

      if (!username || !password) { err.style.display = "block"; err.textContent = "Isi username dan password."; return; }

      btn.disabled = true;
      btn.textContent = "Memeriksa...";
      err.style.display = "none";

      try {
        const ok = await doLogin(username, password);
        if (ok) {
          window.location.href = "pages/dashboard.html";
        } else {
          err.style.display = "block";
          err.textContent = "Username atau password salah.";
        }
      } catch (e) {
        err.style.display = "block";
        err.textContent = "Gagal terhubung ke server.";
      }

      btn.disabled = false;
      btn.textContent = "Masuk";
    }
  </script>
</body>
</html>
