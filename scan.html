<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan - GTW BDO</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .tabs { display:flex; gap:0; margin-bottom:0; }
    .tab-btn {
      padding: 10px 24px; border:none; background:#e5e7eb; cursor:pointer;
      font-size:0.92rem; font-weight:600; color:#6b7280; border-radius:8px 8px 0 0;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active { background:var(--primary); color:#fff; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
  </style>
</head>
<body>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script> requireLogin(); renderNavbar("scan"); </script>

  <div class="container">
    <div class="page-title">🔍 Scan</div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('scan_ob', this)">📦 Scan OB</button>
      <button class="tab-btn" onclick="switchTab('scan_ib', this)">📥 Scan IB</button>
      <button class="tab-btn" onclick="switchTab('scan_hvs', this)">🏷️ Scan HVS</button>
    </div>

    <!-- SCAN OB -->
    <div id="tab_scan_ob" class="tab-content active">
      <div class="card" style="border-radius:0 10px 10px 10px">
        <div class="card-title">➕ Input Scan OB</div>
        <div class="form-grid">
          <div class="form-group">
            <label>No Track / Bag</label>
            <input type="text" id="sob_no_track" placeholder="Scan / ketik No Track" />
          </div>
          <div class="form-group">
            <label>Incharge</label>
            <select id="sob_incharge">
              <option value="">-- Pilih --</option>
            </select>
          </div>
          <div class="form-group">
            <label>Tanggal Scan</label>
            <input type="datetime-local" id="sob_scan_date" />
          </div>
          <div class="form-group">
            <label>AWB / Bag</label>
            <input type="text" id="sob_awb_bag" placeholder="No AWB atau Bag" />
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="sob_status">
              <option value="SCAN">SCAN</option>
              <option value="PROSES">PROSES</option>
              <option value="SELESAI">SELESAI</option>
            </select>
          </div>
          <div class="form-group">
            <label>Service</label>
            <select id="sob_service">
              <option value="SAMEDAY">SAMEDAY</option>
              <option value="NEXTDAY">NEXTDAY</option>
            </select>
          </div>
          <div class="form-group">
            <label>Tujuan</label>
            <input type="text" id="sob_tujuan" placeholder="Tujuan" />
          </div>
          <div class="form-group">
            <label>URL Foto</label>
            <input type="url" id="sob_foto_url" placeholder="https://..." />
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="btnSobSimpan" onclick="simpanScanOB()">💾 Simpan</button>
          <button class="btn" style="background:#e5e7eb" onclick="resetSob()">Reset</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📋 Data Scan OB</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>No Track</th><th>Incharge</th><th>AWB/Bag</th><th>Tujuan</th><th>Scan Date</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody id="tbScanOB"><tr><td colspan="8" style="text-align:center;padding:20px;color:#999">Memuat...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- SCAN IB -->
    <div id="tab_scan_ib" class="tab-content">
      <div class="card" style="border-radius:0 10px 10px 10px">
        <div class="card-title">➕ Input Scan IB</div>
        <div class="form-grid">
          <div class="form-group"><label>No HVS</label><input type="text" id="sib_no_hvs" placeholder="No HVS" /></div>
          <div class="form-group"><label>Incharge</label><select id="sib_incharge"><option value="">-- Pilih --</option></select></div>
          <div class="form-group"><label>Tanggal Scan</label><input type="datetime-local" id="sib_scan_date" /></div>
          <div class="form-group"><label>AWB</label><input type="text" id="sib_awb" placeholder="No AWB" /></div>
          <div class="form-group"><label>Tujuan</label><input type="text" id="sib_tujuan" placeholder="Tujuan" /></div>
          <div class="form-group"><label>Status</label><select id="sib_status"><option value="SCAN">SCAN</option><option value="PROSES">PROSES</option><option value="SELESAI">SELESAI</option></select></div>
          <div class="form-group"><label>Service</label><select id="sib_service"><option value="SAMEDAY">SAMEDAY</option><option value="NEXTDAY">NEXTDAY</option></select></div>
          <div class="form-group"><label>From</label><input type="text" id="sib_from_loc" placeholder="Asal" /></div>
          <div class="form-group"><label>URL Foto</label><input type="url" id="sib_foto_url" placeholder="https://..." /></div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="btnSibSimpan" onclick="simpanScanIB()">💾 Simpan</button>
          <button class="btn" style="background:#e5e7eb" onclick="resetSib()">Reset</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📋 Data Scan IB</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>No HVS</th><th>Incharge</th><th>AWB</th><th>Tujuan</th><th>From</th><th>Scan Date</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody id="tbScanIB"><tr><td colspan="9" style="text-align:center;padding:20px;color:#999">Memuat...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- SCAN HVS -->
    <div id="tab_scan_hvs" class="tab-content">
      <div class="card" style="border-radius:0 10px 10px 10px">
        <div class="card-title">➕ Input Scan HVS</div>
        <div class="form-grid">
          <div class="form-group"><label>No HVS</label><input type="text" id="shvs_no_hvs" placeholder="No HVS" /></div>
          <div class="form-group"><label>Incharge</label><select id="shvs_incharge"><option value="">-- Pilih --</option></select></div>
          <div class="form-group"><label>Tanggal Scan</label><input type="datetime-local" id="shvs_scan_date" /></div>
          <div class="form-group"><label>AWB</label><input type="text" id="shvs_awb" placeholder="No AWB" /></div>
          <div class="form-group"><label>Status</label><select id="shvs_status"><option value="SCAN">SCAN</option><option value="PROSES">PROSES</option><option value="SELESAI">SELESAI</option></select></div>
          <div class="form-group"><label>Service</label><select id="shvs_service"><option value="SAMEDAY">SAMEDAY</option><option value="NEXTDAY">NEXTDAY</option></select></div>
          <div class="form-group"><label>Tujuan</label><input type="text" id="shvs_tujuan" placeholder="Tujuan" /></div>
          <div class="form-group"><label>URL Foto</label><input type="url" id="shvs_foto_url" placeholder="https://..." /></div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="btnShvsSimpan" onclick="simpanScanHVS()">💾 Simpan</button>
          <button class="btn" style="background:#e5e7eb" onclick="resetShvs()">Reset</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📋 Data Scan HVS</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>No HVS</th><th>Incharge</th><th>AWB</th><th>Tujuan</th><th>Scan Date</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody id="tbScanHVS"><tr><td colspan="8" style="text-align:center;padding:20px;color:#999">Memuat...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    function switchTab(name, btn) {
      document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.getElementById("tab_" + name).classList.add("active");
      btn.classList.add("active");
    }

    async function loadIncharge(selId) {
      try {
        const data = await dbGet("data_incharge", "select=incharge&order=incharge");
        const unique = [...new Set(data.map(d => d.incharge))];
        const sel = document.getElementById(selId);
        unique.forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
      } catch(e) {}
    }

    async function init() {
      const now = todayISO();
      ["sob_scan_date","sib_scan_date","shvs_scan_date"].forEach(id => document.getElementById(id).value = now);
      await Promise.all([loadIncharge("sob_incharge"), loadIncharge("sib_incharge"), loadIncharge("shvs_incharge")]);
      loadScanOB(); loadScanIB(); loadScanHVS();
    }

    // ---- SCAN OB ----
    async function loadScanOB() {
      try {
        const data = await dbGet("scan_ob", "select=*&order=scan_date.desc&limit=30");
        const tb = document.getElementById("tbScanOB");
        tb.innerHTML = data.length === 0
          ? `<tr><td colspan="8" style="text-align:center;padding:20px;color:#999">Belum ada data</td></tr>`
          : data.map((r,i) => `<tr>
              <td>${i+1}</td><td>${r.no_track||"-"}</td><td>${r.incharge||"-"}</td>
              <td>${r.awb_bag||"-"}</td><td>${r.tujuan||"-"}</td>
              <td>${formatDate(r.scan_date)}</td>
              <td><span class="badge badge-blue">${r.status||"-"}</span></td>
              <td><button class="btn btn-sm btn-danger" onclick="hapusScan('scan_ob',${r.id},loadScanOB)">🗑️</button></td>
            </tr>`).join("");
      } catch(e) {}
    }

    async function simpanScanOB() {
      const btn = document.getElementById("btnSobSimpan");
      const payload = {
        no_track: document.getElementById("sob_no_track").value.trim(),
        incharge: document.getElementById("sob_incharge").value,
        scan_date: document.getElementById("sob_scan_date").value || null,
        awb_bag: document.getElementById("sob_awb_bag").value.trim(),
        status: document.getElementById("sob_status").value,
        service: document.getElementById("sob_service").value,
        tujuan: document.getElementById("sob_tujuan").value.trim(),
        foto_url: document.getElementById("sob_foto_url").value.trim() || null,
      };
      if (!payload.no_track) { showToast("Isi No Track", "error"); return; }
      setLoading(btn, true);
      try { await dbInsert("scan_ob", payload); showToast("Scan OB disimpan ✅"); resetSob(); loadScanOB(); }
      catch(e) { showToast("Gagal: " + e.message, "error"); }
      setLoading(btn, false);
    }

    function resetSob() {
      ["sob_no_track","sob_awb_bag","sob_tujuan","sob_foto_url"].forEach(id => document.getElementById(id).value="");
      document.getElementById("sob_incharge").value = "";
      document.getElementById("sob_scan_date").value = todayISO();
    }

    // ---- SCAN IB ----
    async function loadScanIB() {
      try {
        const data = await dbGet("scan_ib", "select=*&order=scan_date.desc&limit=30");
        const tb = document.getElementById("tbScanIB");
        tb.innerHTML = data.length === 0
          ? `<tr><td colspan="9" style="text-align:center;padding:20px;color:#999">Belum ada data</td></tr>`
          : data.map((r,i) => `<tr>
              <td>${i+1}</td><td>${r.no_hvs||"-"}</td><td>${r.incharge||"-"}</td>
              <td>${r.awb||"-"}</td><td>${r.tujuan||"-"}</td><td>${r.from_loc||"-"}</td>
              <td>${formatDate(r.scan_date)}</td>
              <td><span class="badge badge-blue">${r.status||"-"}</span></td>
              <td><button class="btn btn-sm btn-danger" onclick="hapusScan('scan_ib',${r.id},loadScanIB)">🗑️</button></td>
            </tr>`).join("");
      } catch(e) {}
    }

    async function simpanScanIB() {
      const btn = document.getElementById("btnSibSimpan");
      const payload = {
        no_hvs: document.getElementById("sib_no_hvs").value.trim(),
        incharge: document.getElementById("sib_incharge").value,
        scan_date: document.getElementById("sib_scan_date").value || null,
        awb: document.getElementById("sib_awb").value.trim(),
        tujuan: document.getElementById("sib_tujuan").value.trim(),
        status: document.getElementById("sib_status").value,
        service: document.getElementById("sib_service").value,
        from_loc: document.getElementById("sib_from_loc").value.trim(),
        foto_url: document.getElementById("sib_foto_url").value.trim() || null,
      };
      if (!payload.no_hvs) { showToast("Isi No HVS", "error"); return; }
      setLoading(btn, true);
      try { await dbInsert("scan_ib", payload); showToast("Scan IB disimpan ✅"); resetSib(); loadScanIB(); }
      catch(e) { showToast("Gagal: " + e.message, "error"); }
      setLoading(btn, false);
    }

    function resetSib() {
      ["sib_no_hvs","sib_awb","sib_tujuan","sib_from_loc","sib_foto_url"].forEach(id => document.getElementById(id).value="");
      document.getElementById("sib_incharge").value = "";
      document.getElementById("sib_scan_date").value = todayISO();
    }

    // ---- SCAN HVS ----
    async function loadScanHVS() {
      try {
        const data = await dbGet("scan_hvs", "select=*&order=scan_date.desc&limit=30");
        const tb = document.getElementById("tbScanHVS");
        tb.innerHTML = data.length === 0
          ? `<tr><td colspan="8" style="text-align:center;padding:20px;color:#999">Belum ada data</td></tr>`
          : data.map((r,i) => `<tr>
              <td>${i+1}</td><td>${r.no_hvs||"-"}</td><td>${r.incharge||"-"}</td>
              <td>${r.awb||"-"}</td><td>${r.tujuan||"-"}</td>
              <td>${formatDate(r.scan_date)}</td>
              <td><span class="badge badge-blue">${r.status||"-"}</span></td>
              <td><button class="btn btn-sm btn-danger" onclick="hapusScan('scan_hvs',${r.id},loadScanHVS)">🗑️</button></td>
            </tr>`).join("");
      } catch(e) {}
    }

    async function simpanScanHVS() {
      const btn = document.getElementById("btnShvsSimpan");
      const payload = {
        no_hvs: document.getElementById("shvs_no_hvs").value.trim(),
        incharge: document.getElementById("shvs_incharge").value,
        scan_date: document.getElementById("shvs_scan_date").value || null,
        awb: document.getElementById("shvs_awb").value.trim(),
        status: document.getElementById("shvs_status").value,
        service: document.getElementById("shvs_service").value,
        tujuan: document.getElementById("shvs_tujuan").value.trim(),
        foto_url: document.getElementById("shvs_foto_url").value.trim() || null,
      };
      if (!payload.no_hvs) { showToast("Isi No HVS", "error"); return; }
      setLoading(btn, true);
      try { await dbInsert("scan_hvs", payload); showToast("Scan HVS disimpan ✅"); resetShvs(); loadScanHVS(); }
      catch(e) { showToast("Gagal: " + e.message, "error"); }
      setLoading(btn, false);
    }

    function resetShvs() {
      ["shvs_no_hvs","shvs_awb","shvs_tujuan","shvs_foto_url"].forEach(id => document.getElementById(id).value="");
      document.getElementById("shvs_incharge").value = "";
      document.getElementById("shvs_scan_date").value = todayISO();
    }

    async function hapusScan(table, id, reload) {
      confirmDelete(async () => {
        try { await dbDelete(table, id); showToast("Dihapus"); reload(); }
        catch(e) { showToast("Gagal", "error"); }
      });
    }

    init();
  </script>
</body>
</html>
